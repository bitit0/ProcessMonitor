name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish ProcessMonitor.csproj -c Release -r win-x64 --self-contained true -o publish

      - name: Zip
        run: Compress-Archive -Path publish\* -DestinationPath ProcessMonitor.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProcessMonitor
          path: ProcessMonitor.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          files: ProcessMonitor.zip